apiVersion:  apps/v1
metadata:
  name:  college-deploy
spec:
  replicas:  3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:  25%
      maxUnavailable:  25%
    
  selector:
    matchLabels:
      app:  college-app
  template:
    metadata:
      labels:
        app:  college-app
    spec:
      containers:
        - image:  iyask/collegeapp
          name: sql-cont
          ports:
            - containerPort:  3000
          resources:
            requests:
              cpu:  "100m"
              memory:  "128Mi"
            limits:
              cpu:  "200m"
              memory:  "256Mi"
          envFrom:
            - configMapRef:
              name:  app-config
                
                
     
---
apiVersion:  v1
kind:  Service
metadata:
  name:  app-service
spec:
   selector:
     app: sql-app
   type:  ClusterIP
   ports:
     - port:  3000
       targetPort:  3000

            



    
